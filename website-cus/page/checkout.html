<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ADMyself Store</title>
  <link rel="stylesheet" href="../css/style-new.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">ADMyself Store</div>
  <div class="menu">
    <a href="index.html">Home</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Sale</a>
  </div>
</div>

<!-- CHECKOUT -->
<div class="checkout-container">
  <h1>Checkout Pembayaran</h1>

  <div class="checkout-content">
    <div class="order-summary">
      <h2>Ringkasan Pesanan</h2>
      <div id="order-items">
        <!-- Order items will be loaded here -->
      </div>
      <div class="checkout-total">
        <h3>Total Pembayaran</h3>
        <p style="font-size: 1.5rem; color: #007bff; font-weight: 700;">Rp <span id="checkout-total">0</span></p>
      </div>
    </div>

    <div class="customer-form">
      <h2>Informasi Pengiriman</h2>
      <form id="checkout-form">
        <div class="form-group">
          <label for="name">Nama Lengkap *</label>
          <input type="text" id="name" required placeholder="Masukkan nama lengkap">
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label for="phone">Nomor Telepon *</label>
          <input type="tel" id="phone" required placeholder="08123456789">
        </div>

        <div class="form-group">
          <label for="address">Alamat Lengkap *</label>
          <textarea id="address" rows="3" required placeholder="Jl. Contoh No. 123, RT/RW 01/02, Kelurahan, Kecamatan, Kota, Kode Pos"></textarea>
        </div>

        <div class="form-group">
          <label for="notes">Catatan Tambahan (Opsional)</label>
          <textarea id="notes" rows="2" placeholder="Warna, ukuran, atau instruksi khusus"></textarea>
        </div>

        <button type="submit" class="place-order-btn">Buat Pesanan</button>
      </form>
    </div>
  </div>
</div>

<script src="../assets/js/checkout.js"></script>

</body>
</html>
