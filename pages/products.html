<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🛍 E-Commerce</h2>
        <ul>
            <li onclick="location.href='dashboard.html'">Dashboard</li>
            <li class="active">Products</li>
            <li onclick="location.href='restock.html'">Restock</li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">

        <div class="topbar">
            <h3>Product Management 📦</h3>
        </div>

        <div style="margin-bottom:20px;">
            <input type="text" id="name" placeholder="Nama Produk">
            <input type="text" id="brand" placeholder="Brand">
            <input type="text" id="category" placeholder="Category">
            <input type="number" id="price" placeholder="Price">
            <button onclick="tambahProduk()">Tambah Produk</button>
        </div>

        <div style="margin-bottom:20px;">
            <input type="number" id="product_id" placeholder="Product ID">
            <input type="text" id="size" placeholder="Size (optional)">
            <input type="text" id="color" placeholder="Color (optional)">
            <input type="number" id="stock" placeholder="Stock">
            <button onclick="tambahVariant()">Tambah Variant</button>
        </div>

        <div class="card table">
            <h3>All Products</h3>

            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Size</th>
                        <th>Color</th>
                        <th>Stock</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="productTable"></tbody>

            </table>
        </div>

    </main>

</div>

<script src="../assets/js/products.js"></script>
</body>
</html>
