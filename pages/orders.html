<html lang="en">

<meta charset="UTF-8">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🛍 E-Commerce</h2>
        <ul>
            <li ><a href="Dashboard.html">Dashboard</a></li>
            <li ><a href="customers.html">Customer</a></li>
            <li ><a href="products.html">Products</a></li>

    <!-- Main -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">
            <h3>Orders Management 📦</h3>
            <input type="text" placeholder="Search orders...">
            <div class="profile">RF</div>
        </div>

        <!-- Orders Table -->
        <div class="card table">

            <p style="color:#777; margin-bottom:15px;">

            </p>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product</th>
                        <th>Size</th>
                        <th>Color</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>

                <tbody id="orderTable"></tbody>
            </table>
