<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Elvoo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h2>ELVOO ADMIN</h2>
      <div style="margin-bottom: 20px; padding: 0 10px">
        <p
          id="user-display"
          style="font-weight: bold; color: white; margin: 0"
        ></p>
        <small id="role-display" style="color: #888"></small>
      </div>
      <nav>
        <ul style="list-style: none; padding: 0">
          <li onclick="changePage('inventory')" id="menu-inv" class="menu-item">
            Inventory
          </li>
          <li onclick="changePage('orders')" id="menu-orders" class="menu-item">
            Pesanan Masuk
          </li>
          <li onclick="changePage('sales')" id="menu-sales" class="menu-item">
            Penghasilan
          </li>
          <li onclick="changePage('website')" id="menu-web" class="menu-item">
            Website
          </li>
        </ul>
      </nav>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>

    <div class="main">
      <div id="page-inventory" class="content-page">
        <div class="form" id="input-area">
          <h3>Tambah Produk Baru</h3>
          <div class="grid-in">
            <input type="text" id="nama" placeholder="Nama Produk" />
            <input type="number" id="harga" placeholder="Harga" />
            <input type="number" id="stok" placeholder="Stok" />
            <input
              type="text"
              id="gambar"
              placeholder="File Gambar (ex: baju.jpg)"
            />
            <button class="btn-add" onclick="tambahProduk()">
              SIMPAN PRODUK
            </button>
          </div>
        </div>
        <div class="card-table">
          <h3>Daftar Barang</h3>
          <table>
            <thead>
              <tr>
                <th>Gambar</th>
                <th>Produk</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabel-body"></tbody>
          </table>
        </div>
      </div>

      <div id="page-orders" class="content-page" style="display: none">
        <div class="card-table">
          <h3>🔔 Pesanan Masuk (Butuh Persetujuan)</h3>
          <table>
            <thead>
              <tr>
                <th>WAKTU</th>
                <th>PRODUK</th>
                <th>NOMINAL</th>
                <th>AKSI</th>
              </tr>
            </thead>
            <tbody id="tabel-order-approval"></tbody>
          </table>
        </div>
      </div>

      <div id="page-sales" class="content-page" style="display: none">
        <div class="stats-card">
          <small>Total Penghasilan</small>
          <h1 id="total-duit">Rp 0</h1>
        </div>
        <div class="card-table">
          <table>
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Produk</th>
                <th>Nominal</th>
              </tr>
            </thead>
            <tbody id="tabel-penjualan"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="modal-edit" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3>Edit Produk</h3>
        <div class="modal-body">
          <input type="text" id="modal-nama" />
          <input type="number" id="modal-harga" />
          <input type="number" id="modal-stok" />
          <input type="text" id="modal-gambar" />
          <input type="hidden" id="modal-index" />
          <button class="btn-save-modal" onclick="simpanPerubahanModal()">
            Simpan Perubahan
          </button>
          <button
            class="btn-delete-modal"
            onclick="hapusProdukModal()"
            style="background: #ef4444; color: white"
          >
            Hapus
          </button>
        </div>
      </div>
    </div>

    <div id="modal-detail" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeDetail()">&times;</span>
        <h3>Detail Pembeli</h3>
        <hr />
        <div
          id="detail-content"
          style="text-align: left; margin-top: 15px; line-height: 1.6"
        ></div>
        <button
          onclick="closeDetail()"
          style="width: 100%; margin-top: 15px; padding: 10px; cursor: pointer"
        >
          Tutup
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
