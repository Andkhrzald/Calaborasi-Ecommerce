<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <title>Login Admin - Elvoo</title>
  <link rel="stylesheet" href="style1.css" />
</head>

<body>
  <div class="box">
    <h2>ELVOO ADMIN</h2>
    <!-- Action diubah mengarah ke backend sesungguhnya (PHP) untuk diproses -->
    <form action="login.php" method="POST" id="login-form">
      <input type="text" name="user" id="user" placeholder="Username" autocomplete="off" required />
      <input type="password" name="pass" id="pass" placeholder="Password" required />
      <!-- Tombol submit standar form HTML -->
      <button type="submit">LOGIN</button>
    </form>
  </div>
  <script src="login.js"></script>
</body>

</html>
