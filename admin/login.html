<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Crew - Elvoo</title>
        <link rel="stylesheet" href="style1.css" />
 </head>
  <body>
    <div class="box">
      <h2>ELVOO ADMIN</h2>
      <input type="text" id="user" placeholder="Username" />
      <input type="password" id="pass" placeholder="Password" />
      <button onclick="login()">LOGIN</button>
    </div>

    <script>
      function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        const database = [
          { username: "admin_brand", pass: "123", role: "Owner" },
          { username: "crew_stok", pass: "456", role: "Warehouse" },
          { username: "crew_input", pass: "789", role: "Staff" },
        ];
        const cek = database.find(
          (item) => item.username === u && item.pass === p,
        );
        if (cek) {
          sessionStorage.setItem("loggedInUser", JSON.stringify(cek));
          window.location.href = "index.html";
        } else {
          alert("Data tidak dikenal!");
        }
      }
    </script>
  </body>
</html>
